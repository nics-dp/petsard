name: 📦 Semantic Release and PyPI Publish

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read # repo writes go through the GitHub App token, not GITHUB_TOKEN
  id-token: write
  issues: write # allow the failure-alert step to open a tracking issue

# Serialize releases per branch: the app-token push of the version-bump commit can
# overlap with another push, and concurrent runs would race on `git push`.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Skip the run triggered by semantic-release's own version-bump commit. Because the
    # commit is pushed with a GitHub App token (not GITHUB_TOKEN), it re-triggers this
    # `on: push` workflow; that follow-up run would otherwise rebuild/republish needlessly.
    # Match on the push ACTOR (the App bot), which is set by the push credential and cannot
    # be spoofed from commit content -- unlike a commit author/message, which a squash-merge
    # of dev->main would also fold in and wrongly match. The bot's own push runs as the
    # App's bot account `<app-slug>[bot]`.
    if: ${{ github.actor != 'petsard-release-bot[bot]' }}
    steps:
      # Mint a short-lived GitHub App installation token. The release identity must be
      # a bypass actor on the main/dev rulesets so semantic-release can push the
      # version-bump commit (rulesets enforce pull_request + required_signatures).
      # See: https://github.com/nics-dp/petsard/issues/999
      - name: Setup | Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # Attribute the version-bump commit to the App's bot identity
      - name: Setup | Resolve App bot user id
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "id=$(gh api '/users/${{ steps.app-token.outputs.app-slug }}[bot]' --jq .id)" >> "$GITHUB_OUTPUT"

      # Checkout the repository code (v10.5.0+ automatically handles repository un-shallowing)
      - name: Setup | Checkout Repository on Release Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          # App token lets semantic-release push version updates (bypass actor on the ruleset)
          token: ${{ steps.app-token.outputs.token }}

      # Configure git so the version-bump commit is attributed to the App bot
      - name: Setup | Configure git identity
        run: |
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      # Force reset local branch to the exact commit that triggered the workflow
      - name: Setup | Force release branch to be at workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      # Install uv tool
      - name: Setup | Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      # Execute semantic version analysis, automatically determine version and create tags
      # v10.5.0+ includes automatic repository un-shallowing and upstream version checking
      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ steps.app-token.outputs.token }}

      # Build Python package distribution files using uv
      # Always build on every push to allow continuous deployment
      - name: Publish | Build package with uv
        run: |
          # Get current version from pyproject.toml
          CURRENT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)".*/\1/')
          echo "Building version: $CURRENT_VERSION"
          
          # Use --no-sources to ensure build compatibility without tool.uv.sources
          uv build --no-sources

      # Publish package to TestPyPI testing environment (dev branch only)
      # Always publish on dev branch push, skip-existing handles duplicate versions
      - name: Publish | Upload package to TestPyPI (dev branch)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        if: github.ref_name == 'dev'
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          skip-existing: true
          attestations: true

      # Publish package to official PyPI environment (main branch only)
      # Always publish on main branch push, skip-existing handles duplicate versions
      - name: Publish | Upload package to PyPI (main branch)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        if: github.ref_name == 'main'
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          attestations: true

      # Upload built files to GitHub Releases as release assets
      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.release.outputs.tag }}

      # Surface release failures loudly so they are not silently ignored
      # (this workflow has no required status check gating merges).
      - name: Notify | Open tracking issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="release workflow failed on ${{ github.ref_name }}"
          # Comment on an existing open issue with this title, otherwise open a new one
          existing=$(gh issue list --state open --search "in:title $title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Release run failed again: $RUN_URL (sha ${{ github.sha }})"
          else
            gh issue create --label ci --label bug \
              --title "$title" \
              --body "Semantic Release / PyPI publish failed on \`${{ github.ref_name }}\`.

          Run: $RUN_URL
          Commit: ${{ github.sha }}

          See #999 for the App-token / ruleset-bypass setup this depends on."
          fi